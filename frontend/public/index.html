<!DOCTYPE html>
<html>
<head>
  <title>Smarty Empresas</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
  <h1>Smarty Empresas</h1>
  <button onclick="carregar()">Atualizar</button>
</header>

<div class="card">
  <h2 id="nome">Carregando...</h2>
  <p id="desc"></p>
</div>

<div class="grid">
  <div class="box">Endereço: <span id="endereco"></span></div>
  <div class="box">Telefone: <span id="telefone"></span></div>
  <div class="box">Email: <span id="email"></span></div>
  <div class="box">Colaboradores: <span id="colaboradores"></span></div>
  <div class="box">Entregas: <span id="entregas"></span></div>
</div>

<script src="script.js"></script>
</body>
</html>
